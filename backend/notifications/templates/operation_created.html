<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification de Validation</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f7; color: #333;">
    <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; margin: 20px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <tr>
            <td style="padding: 30px 40px; background-color: #2563eb; text-align: center;">
                <h1 style="margin: 0; color: #ffffff; font-size: 22px; font-weight: 600;">Nouvelle opération à valider</h1>
            </td>
        </tr>

        <tr>
            <td style="padding: 40px;">
                <p style="margin-top: 0; margin-bottom: 24px; font-size: 16px; line-height: 1.6;">
                    Une nouvelle opération nécessite votre approbation. Voici les détails :
                </p>
                
                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom: 30px; border-collapse: collapse;">
                    <tr>
                        <td style="padding: 10px 0; border-bottom: 1px solid #edf2f7; font-weight: bold; width: 120px;">Initiateur :</td>
                        <td style="padding: 10px 0; border-bottom: 1px solid #edf2f7;">{{ initiator }}</td>
                    </tr>
                    <tr>
                        <td style="padding: 10px 0; border-bottom: 1px solid #edf2f7; font-weight: bold;">Montant :</td>
                        <td style="padding: 10px 0; border-bottom: 1px solid #edf2f7;">{{ amount }} Ar</td>
                    </tr>
                    <tr>
                        <td style="padding: 10px 0; border-bottom: 1px solid #edf2f7; font-weight: bold;">Destinataire :</td>
                        <td style="padding: 10px 0; border-bottom: 1px solid #edf2f7;">{{ recipient }}</td>
                    </tr>
                </table>

                <div style="text-align: center; margin-top: 40px;">
                    <a href="#" style="background-color: #2563eb; color: #ffffff; padding: 14px 28px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block;">Connectez-vous pour valider</a>
                </div>
            </td>
        </tr>

        <tr>
            <td style="padding: 20px; text-align: center; background-color: #f8fafc; font-size: 12px; color: #64748b;">
                Ceci est une notification automatique. Veuillez ne pas répondre à cet e-mail.
            </td>
        </tr>
    </table>
</body>
</html>
